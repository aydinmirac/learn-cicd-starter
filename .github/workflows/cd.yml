on:
  push:
    branches: [main]

jobs:
  tests:
    name: Deploy
    runs-on: ubuntu-latest
    
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.0'

      - name: Install Goose:
        run: |
            go install github.com/pressly/goose/v3/cmd/goose@latest
            goose -version
      
      - name: Build the binary
        run: ./scripts/buildprod.sh

      - name: Run the DB migration
        run: ./scripts/migrateup.sh

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Use gcloud CLI
        run: gcloud info

      - name: Push the Docker image to Google Artifact Registry
        run: gcloud builds submit --tag europe-west10-docker.pkg.dev/notely-471619/notely-ar-repo/notely:latest .

      - name: Deploy to Cloud Run
        run: gcloud run deploy notely --image europe-west10-docker.pkg.dev/notely-471619/notely-ar-repo/notely:latest --region europe-west1 --allow-unauthenticated --project notely-471619 --max-instances=4
      